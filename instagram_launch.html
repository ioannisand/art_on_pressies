<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art on Pressies — We're Live!</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5b2f7;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
  }

  /* The card — screenshot this. Sized 1080×1080 scaled to fit screen. */
  .card {
    width: 540px;
    height: 540px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #fce8fd 0%, #f5b2f7 40%, #dc84f0 75%, #be78de 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px;
  }

  /* Decorative blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(48px);
    opacity: 0.35;
    pointer-events: none;
  }
  .blob-1 { width: 280px; height: 280px; background: #be78de; top: -60px; left: -60px; }
  .blob-2 { width: 220px; height: 220px; background: #fce8fd; bottom: -40px; right: -40px; }
  .blob-3 { width: 160px; height: 160px; background: #3d1a5e; top: 50%; left: 70%; transform: translateY(-50%); opacity: 0.15; }

  /* Sparkle dots */
  .sparkle {
    position: absolute;
    border-radius: 50%;
    background: white;
    opacity: 0.7;
  }
  .sp1 { width: 8px;  height: 8px;  top: 18%;  left: 14%; }
  .sp2 { width: 5px;  height: 5px;  top: 72%;  left: 10%; }
  .sp3 { width: 6px;  height: 6px;  top: 22%;  right: 16%; }
  .sp4 { width: 10px; height: 10px; bottom: 20%; right: 12%; }
  .sp5 { width: 4px;  height: 4px;  top: 48%;  left: 8%; }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .badge {
    background: white;
    color: #be78de;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 999px;
    margin-bottom: 22px;
    box-shadow: 0 2px 12px rgba(62,26,94,0.12);
  }

  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #3d1a5e;
    opacity: 0.7;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 46px;
    font-weight: 900;
    line-height: 1.08;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #2d0a4e, #6b21a8, #be78de);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 14px;
    font-weight: 600;
    color: #3d1a5e;
    opacity: 0.75;
    line-height: 1.6;
    max-width: 340px;
    margin-bottom: 28px;
  }

  .divider {
    width: 48px;
    height: 3px;
    background: linear-gradient(to right, #dc84f0, #be78de);
    border-radius: 999px;
    margin-bottom: 28px;
  }

  .url-pill {
    background: #3d1a5e;
    color: white;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 10px 28px;
    border-radius: 999px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(62,26,94,0.25);
  }

  .nail-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .nail {
    width: 20px;
    height: 28px;
    background: linear-gradient(160deg, #fce8fd, #dc84f0);
    border-radius: 40% 40% 30% 30% / 50% 50% 40% 40%;
    border: 1.5px solid rgba(255,255,255,0.6);
    box-shadow: 0 2px 6px rgba(62,26,94,0.15);
  }
  .nail:nth-child(2) { height: 32px; background: linear-gradient(160deg, #f5b2f7, #be78de); }
  .nail:nth-child(3) { height: 34px; background: linear-gradient(160deg, #fce8fd, #dc84f0); }
  .nail:nth-child(4) { height: 31px; background: linear-gradient(160deg, #f5b2f7, #be78de); }
  .nail:nth-child(5) { height: 22px; background: linear-gradient(160deg, #fce8fd, #dc84f0); }

  /* Corner watermark */
  .corner {
    position: absolute;
    bottom: 18px;
    right: 22px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #3d1a5e;
    opacity: 0.35;
    z-index: 2;
  }
</style>
</head>
<body>

<div class="card">
  <!-- Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Sparkles -->
  <div class="sparkle sp1"></div>
  <div class="sparkle sp2"></div>
  <div class="sparkle sp3"></div>
  <div class="sparkle sp4"></div>
  <div class="sparkle sp5"></div>

  <!-- Main content -->
  <div class="content">
    <div class="badge">✨ We're live!</div>
    <div class="logo">Art on Pressies</div>
    <h1>Shop is<br>Open!</h1>
    <p class="tagline">Handcrafted press-on nails, made with love.<br>Browse, pick your favourites & order online.</p>
    <div class="divider"></div>
    <div class="url-pill">art-on-pressies.fly.dev</div>
    <div class="nail-row">
      <div class="nail"></div>
      <div class="nail"></div>
      <div class="nail"></div>
      <div class="nail"></div>
      <div class="nail"></div>
    </div>
  </div>

  <div class="corner">artonpressies</div>
</div>

</body>
</html>
